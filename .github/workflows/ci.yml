name: CI

on:
  push:
    branches:
      - main
  pull_request:
    branches:
      - main

permissions:
  contents: read

jobs:
  build:
    name: Build and smoke test
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Configure
        run: cmake -S . -B build -DCMAKE_BUILD_TYPE=Release

      - name: Build
        run: cmake --build build --config Release --parallel

      - name: Show help
        run: ./build/doc_parser --help

      - name: Check argument validation
        run: |
          set +e
          ./build/doc_parser missing.pdf --out output
          status=$?
          set -e
          test "$status" -ne 0
