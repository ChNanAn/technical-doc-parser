name: CI

on:
  push:
    branches:
      - main
  pull_request:
    branches:
      - main

permissions:
  contents: read

jobs:
  build:
    name: Build and smoke test
    runs-on: ubuntu-24.04

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Check PDFium setup script
        run: bash tests/check_pdfium_setup_script.sh

      - name: Install PDFium
        run: bash scripts/setup_pdfium.sh

      - name: Install OpenCV
        run: sudo apt-get update && sudo apt-get install -y libopencv-dev

      - name: Configure
        run: cmake -S . -B build -DCMAKE_BUILD_TYPE=Release -DPDFium_DIR=third_party/pdfium

      - name: Build
        run: cmake --build build --config Release --parallel

      - name: Test
        run: ctest --test-dir build --output-on-failure

      - name: Show help
        run: ./build/cpp/app/doc_parser --help

      - name: Check argument validation
        run: |
          set +e
          ./build/cpp/app/doc_parser missing.pdf --out output
          status=$?
          set -e
          test "$status" -ne 0
