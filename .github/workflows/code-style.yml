name: Code Style

on:
  push:
    branches:
      - main
  pull_request:
    branches:
      - main

permissions:
  contents: read

jobs:
  clang-format:
    name: clang-format
    runs-on: ubuntu-24.04

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Install clang-format
        run: python -m pip install "clang-format==13.0.1.1"

      - name: Check C++ formatting
        run: |
          mapfile -t files < <(git ls-files \
            '*.c' '*.cc' '*.cpp' '*.cxx' \
            '*.h' '*.hpp' \
            ':!:third_party/**')

          if [ "${#files[@]}" -eq 0 ]; then
            echo "No C++ files to check."
            exit 0
          fi

          clang-format --dry-run --Werror "${files[@]}"
