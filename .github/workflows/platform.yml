name: Platform

on:
  push:
    branches:
      - main
  pull_request:
    branches:
      - main

permissions:
  contents: read

jobs:
  api:
    name: API and protocol
    runs-on: ubuntu-24.04

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.12'
          cache: pip
          cache-dependency-path: platform/api/pyproject.toml

      - name: Install
        working-directory: platform/api
        run: python -m pip install '.[test]'

      - name: Test
        working-directory: platform/api
        run: pytest

  web:
    name: Web
    runs-on: ubuntu-24.04

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '22'
          cache: npm
          cache-dependency-path: platform/web/package-lock.json

      - name: Install
        working-directory: platform/web
        run: npm ci

      - name: Audit
        working-directory: platform/web
        run: npm audit --audit-level=high

      - name: Build
        working-directory: platform/web
        run: npm run build
